<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden border border-gray-100">

        <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
            <h2 class="text-2xl font-bold text-gray-800">Registrar Movimiento</h2>
            <button type="button" (click)="onCerrar()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">
                &times;
            </button>
        </div>

        <form class="p-6 space-y-5">

            <div>
                <label class="block text-gray-700 font-medium mb-2 text-lg">Categoría</label>
                <select
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-white text-lg">
                    <option value="" disabled selected>Seleccioná una opción...</option>
                    <option value="1">Ganancia Alquiler</option>
                    <option value="2">Gasto Alquiler</option>
                    <option value="3">Inversión</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-gray-700 font-medium mb-2 text-lg">Monto ($)</label>
                    <input type="number" placeholder="Ej: 50000"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-lg">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-2 text-lg">Fecha</label>
                    <input type="date"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-lg">
                </div>
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-2 text-lg">Descripción (Opcional)</label>
                <input type="text" placeholder="Ej: Mes de marzo, compra dólares..."
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-lg">
            </div>

            <div class="pt-4 flex gap-4">
                <button type="button" (click)="onCerrar()"
                    class="flex-1 px-4 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold text-lg transition">
                    Cancelar
                </button>
                <button type="submit"
                    class="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-lg shadow-md transition">
                    Guardar
                </button>
            </div>
        </form>
    </div>
</div>
