<div class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-100 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl p-8 border border-white">

        <div class="text-center mb-8">
            <div
                class="bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">Mis Finanzas</h1>
            <p class="text-gray-500 mt-2 text-lg">Ingresá tu usuario para continuar</p>
        </div>

        <form class="space-y-5">

            @if (messageError) {
            <div
                class="bg-red-50 text-red-600 p-4 rounded-xl text-center border border-red-100 font-semibold animate-pulse">
                {{ messageError }}
            </div>
            }

            <div>
                <label class="block text-gray-700 font-semibold mb-2">Usuario</label>
                <input type="text" name="user" [(ngModel)]="user" placeholder="Ej: Papá"
                    class="w-full px-5 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200 text-lg">
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">Contraseña</label>
                <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••"
                    class="w-full px-5 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200 text-lg">
            </div>

            <button type="button" (click)="login()"
                class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 text-xl mt-6">
                Ingresar
            </button>

        </form>
    </div>
</div>
